name: sleepify
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  freezed_annotation: ^3.1.0
  go_router: ^17.1.0
  google_fonts: ^8.0.2
  intl: ^0.20.2
  json_annotation: ^4.11.0
  riverpod_annotation: ^4.0.2
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  build_runner: ^2.12.2
  riverpod_generator: ^4.0.3

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/relax-thums/
    - assets/sound/relax-sound/
    - assets/sound/nature-sound/
